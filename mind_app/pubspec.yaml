name: mind_app
description: "A Flutter application for interactive learning and AR experiences"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0

  # ── UI & Theming ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2781.2

  url_launcher: ^6.2.5

  # ── State Management ────────────────────────────────────────────────────────
  provider: ^6.1.5+1 # ← only one provider entry (latest)

  # ── Networking & API ────────────────────────────────────────────────────────
  http: ^1.6.0
  google_generative_ai: ^0.4.7

  # ── Storage & Files ─────────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5

  ##text file need
  #image_picker: ^0.8.7+5               # camera/gallery
  google_mlkit_text_recognition: ^0.13.0 # OCR
  #path_provider: ^2.0.14               # save files
  pdf: ^3.10.0 # generate PDF
  open_file: ^3.2.1
  file_picker: ^8.0.0
  file_selector: ^0.9.0
  share_plus: ^8.0.1
  #ntl: ^0.18.1

  # Images & Media
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2
  gal: ^2.3.2
  model_viewer_plus: ^1.7.0

  # ── PDF & Text ──────────────────────────────────────────────────────────────

  # ── Internationalization & Utilities ────────────────────────────────────────
  intl: ^0.19.0
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.1.0
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/brand/
    - assets/icons/
    - assets/illustrations/
    - assets/images/
    - assets/icons/github.png
    - assets/images/mindie.png
    # Category backgrounds
    - assets/images/category_biology_heart.png
    - assets/images/category_history_ruins.png
    - assets/learn_pic.png
    - assets/images/category_engineering_gears.png
    - assets/story1/
    - .env
    # Add more as needed
    - "assets/3d_objects/" # for 3D models
    - "assets/3d_objects/animal/"
    - "assets/3d_objects/cars/"
    - "assets/3d_objects/organ/"
    - "assets/3d_objects/places/"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/brand/play_store_512.png"
  adaptive_icon_background: "#A55FEF" # Brand purple
  adaptive_icon_foreground: "assets/brand/play_store_512.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/brand/play_store_512.png"
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#FFFFFF"
    image: "assets/brand/play_store_512.png"
